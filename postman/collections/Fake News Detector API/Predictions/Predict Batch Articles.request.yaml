$kind: http-request
url: "{{baseUrl}}/predict/batch"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has required fields", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("results");
          pm.expect(jsonData).to.have.property("count");
      });

      pm.test("Results is an array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.results).to.be.an("array");
      });

      pm.test("Count matches results length", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.count).to.eql(jsonData.results.length);
      });

      pm.test("Each result has required fields", function () {
          const jsonData = pm.response.json();
          jsonData.results.forEach((result, idx) => {
              if (!result.error) {
                  pm.expect(result).to.have.property("index");
                  pm.expect(result).to.have.property("label");
                  pm.expect(result).to.have.property("is_fake");
                  pm.expect(result).to.have.property("confidence");
                  pm.expect(["FAKE", "REAL"]).to.include(result.label);
              }
          });
      });
    language: text/javascript
order: 3000
